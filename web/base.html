<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="description" content="Decora — AI-powered furniture matching">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>{% block title %}Decora{% endblock %}</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Aldrich&display=swap" rel="stylesheet">

    <!-- Css Styles -->
    <link rel="stylesheet" href="{{url_for('static',filename='bootstrap.min.css')}}" type="text/css">
    <link rel="stylesheet" href="{{url_for('static',filename='font-awesome.min.css')}}" type="text/css">
    <link rel="stylesheet" href="{{url_for('static',filename='style.css')}}" type="text/css">
    <link rel="stylesheet" href="{{url_for('static',filename='styles1.css')}}" type="text/css">
</head>
<body>

<header class="site-header">
    <a href="{{ url_for('home') }}" class="logo-text">DECORA</a>
</header>

<main class="content">

  {% for message in get_flashed_messages() %}
    <div class="alert alert-warning alert-dismissible fade show" role="alert" style="margin:0;">
      {{ message }}
      <button type="button" class="close" data-dismiss="alert" aria-label="Close">
        <span aria-hidden="true">&times;</span>
      </button>
    </div>
  {% endfor %}
  {% block content %}{% endblock %}

</main>

<footer class="site-footer">
    Built by Iffat Abdul Azeez &mdash;
    <a href="https://github.com/iffatazeez" target="_blank">GitHub</a>
    &nbsp;&middot;&nbsp; &copy; 2026
</footer>

<!-- Js Plugins -->
<script src="{{url_for('static',filename='js/jquery-3.3.1.min.js')}}"></script>
<script src="{{ url_for('static', filename='js/bootstrap.min.js') }}"></script>
</body>
</html>
