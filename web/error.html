{% extends "base.html" %}
{% block title %}Error - Decora{% endblock %}

{% block content %}
    <!-- Breadcrumb Section Begin -->
    <div class="breadcrumb-option spad set-bg" data-setbg="{{ url_for('static', filename='img/breadcrumb-bg.jpg') }}">
        <div class="container">
            <div class="row">
                <div class="col-lg-12 text-center">
                    <div class="breadcrumb__text">
                        <h2>Oops!</h2>
                        <div class="breadcrumb__links">
                            <a href="{{ url_for('home') }}">Home</a>
                            <span>Error</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <!-- Breadcrumb Section End -->

    <section class="spad">
        <div class="container text-center" style="padding: 60px 0;">
            <p style="font-size: 1.2rem; margin-bottom: 2rem;">{{ message }}</p>
            <a href="{{ url_for('search') }}" class="primary-btn">Try Again</a>
        </div>
    </section>
{% endblock %}
