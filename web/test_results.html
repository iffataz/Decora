{% extends "base.html" %}
{% block title %}Results - Decora{% endblock %}

{% block content %}
    <!-- Breadcrumb Section Begin -->
    <div class="breadcrumb-option spad set-bg" data-setbg="{{ url_for('static', filename='img/breadcrumb-bg.jpg') }}">
        <div class="container">
            <div class="row">
                <div class="col-lg-12 text-center">
                    <div class="breadcrumb__text">
                        <h2>Your Results</h2>
                        <div class="breadcrumb__links">
                            <a href="{{ url_for('home') }}">Home</a>
                            <span>Recommended Products</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <!-- Breadcrumb Section End -->

    <section class="blog spad">
        <div class="container">
            <div class="row">
                {% for item in my_list %}
                <div class="col-lg-3 col-md-6 col-sm-6 mb-4">
                    <button type="button" class="btn btn-light w-100 h-100 custom-button" onclick="window.open('{{ item.url }}', '_blank')">
                        <img src="{{ item.image }}" alt="{{ item.name }}" class="img-fluid button-image" style="max-height:200px; object-fit:contain;">
                        <br>
                        <span class="button-text">{{ item.name }}</span>
                        <br>
                        <span class="badge" style="background-color:#dfa667; color:#fff; font-size:0.85rem; padding:4px 8px; border-radius:4px;">
                            Match: {{ item.score }}/10
                        </span>
                        {% if item.price %}
                        <br>
                        <span style="font-size:0.9rem; color:#333; margin-top:4px; display:inline-block;">AU ${{ item.price }}</span>
                        {% endif %}
                        {% if item.rating %}
                        <br>
                        <span style="font-size:0.85rem; color:#666;">
                            &#9733; {{ "%.1f"|format(item.rating) }}
                            {% if item.rating_count %}({{ item.rating_count }}){% endif %}
                        </span>
                        {% endif %}
                    </button>
                </div>
                {% endfor %}
            </div>
            <div class="row mt-4">
                <div class="col-12 text-center">
                    <a href="{{ url_for('search') }}" class="primary-btn">Search Again</a>
                </div>
            </div>
        </div>
    </section>
{% endblock %}
